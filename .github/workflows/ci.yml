name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    env:
      Jwt__SigningKey: ci-only-notisight-test-signing-key-0000000000000000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore backend/tests/Notisight.Api.Tests/Notisight.Api.Tests.csproj

      - name: Test backend
        run: dotnet test backend/tests/Notisight.Api.Tests/Notisight.Api.Tests.csproj --no-restore --configuration Release

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: https://api.notisight.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  deploy-backend:
    name: deploy backend
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_WEBAPP_NAME: notisight-api
      AZURE_WEBAPP_PACKAGE_PATH: backend/src/Notisight.Api/publish

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore backend/src/Notisight.Api/Notisight.Api.csproj

      - name: Publish backend
        run: dotnet publish backend/src/Notisight.Api/Notisight.Api.csproj --configuration Release --no-restore --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
